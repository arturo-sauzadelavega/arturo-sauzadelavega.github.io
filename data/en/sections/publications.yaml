#--------------  Molecular Qubits Chem. Sci.
- title: "Designing molecular qubits: computational insights into first-row and group 6 transition metal complexes."
  date: "June 2025"
  image: "images/sections/publications/toc11.png"
  publishedIn:
    name: "Chem. Sci., 2025, 16, 12896-12905"
    #date: 
    url: https://doi.org/10.1039/D5SC02544C
  authors:
  - name: "Sauza-de la Vega, A."
    highlight: true
  - name: "Darù, A."
  - name: "Nofz, S."
  - name: "Gagliardi, L."
  paper:
    summary: "This second paper in the area of molecular qubits consist of using the developed computational protocol for the rational design of molecular spin qubits. In this paper, we follow the strategy of substituting the metal centers to tune the triplet-singlet gaps and the zero-field splitting parameters. We identify the key featurs governing the design of molecular qubits when considering transition metal centers. In addition, we briefly explore the  effects of molecular distortion upon the molecular qubits electronic structure and the zero-field splitting. "
    url: https://doi.org/10.1039/D5SC02544C
  categories: ["qubits", "magnetism"]
  tags: ["Molecular Qubits", "Zero-Field Splitting", "Triplet-Singlet Gap", "Multireference Calculations"]



#--------------- Uranium Dicarbollides
- title: Electronically Tunable Low-Valent Uranium Metallacarboranes.
  date: "March 2025"
  image: "images/sections/publications/toc10.jpeg"
  publishedIn:
    name: "Inorg. Chem., 2025, 64, 4749-4760"
    #date: 
    url: https://doi.org/10.1021/acs.inorgchem.4c04431
  authors:
  - name: "Kirlikovali, K. O." 
  - name: "Gómez-Torres, A."
  - name: "Sauza-de la Vega, A."
    highlight: true
  - name: "Darù, A."
  - name: "Krzyaniak, M. D."
  - name: "Garg, P."
  - name: "Malliakas, C. D."
  - name: "Wasielewski, M. R."
  - name: "Gagliardi, L."
  - name: "Farha, O. K."
  paper:
    summary: "We studied a series of uranium (III) bisdicarbollide complexes experimentally and with theoretical calculations. The dicarbollide ligands are platforms similar to the Cp ligand, but with the advantage of substituting hydrogen atoms for ligands that can tune the sterics and the electronic properties of the ligand. In this research, we tested electron-donor and -withdrawing ligands and their influence in the redox potentials. Additionally, we evaluate the role of $5f$ orbitals in the metal-ligand bonding. "
    url: https://doi.org/10.1021/acs.inorgchem.4c04431
  categories: ["redox","heavy-elements"]
  tags: ["Actinides", "Redox", "Ligand Functionalization", "DFT" ]


#-------------- Iron IV Trevor Hayton
- title: A homoleptic Fe (iv) ketimide complex with a low-lying excited state.
  date: "September 2024"
  image: "images/sections/publications/toc9.png"
  publishedIn:
    name: "Chem. Sci., 2024, 15, 16559-16566"
    #date: 
    url: https://doi.org/10.1039/D4SC04880F
  authors:
  - name: "Hertler, P. R. "
  - name: "Sauza-de la Vega, A."
    highlight: true
  - name: "Darù, A."
  - name: "Sarkar, A."
  - name: "Lewis, R. A."
  - name: "Wu, G." 
  - name: "Gagliardi, L."
  - name: "Hayton, T. W. "
  paper:
    summary: "In the literature there are a few examples of Fe(IV) complexes. In this research, we studied a quasi-planar ketimide complex. This molecule displays a small magnetic moment at too temperature. We used multireference calculations to elucidate the nature of the ground state. We determined the ground state is a singlet with a low-lying triplet excited state. Due to the small energy difference between these states, we rebeal the magnetic properties are due to temperature independent paramagnetism. " 
    url: https://doi.org/10.1039/D4SC04880F
  categories: ["magnetism"]
  tags: ["Magnetism", "Energy Gap", "Multireference Calculations", "Temperature Independent Paramagnetism"]


#------------ Ruthenium Oxide JACS
- title: Competitive Valerate Binding Enables RuO$_2$-Mediated Butene Electrosynthesis in Water
  date: "July 2024"
  image: "images/sections/publications/toc8.png"
  publishedIn:
    name: "J. Am. Chem. Soc., 2024, 146, 20584-20593"
    #date: 
    url: https://doi.org/10.1021/jacs.4c01776
  authors:
  - name: "Špela, K."
  - name: "Darù, A."
  - name: "Sauza-de la Vega, A."
