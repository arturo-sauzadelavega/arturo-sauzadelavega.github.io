#---------- Aluminium-Sc clusters
- title: Wave function analyses of scandium-doped aluminium clusters, Al$_n$Sc ($n= 1–24$), and their CO$_2$ fixation abilities
  date: "June 2023"
  image: "images/sections/publications/toc7.png"
  publishedIn:
    name: "Phys. Chem. Chem. Phys., 2023, 25, 18854-18865"
    #date: 
    url: https://doi.org/10.1039/D3CP01730C
  authors:
  - name: "Guevara-Vela, J. M."
  - name: "Sauza-de la Vega, A."
    highlight: true
  - name: "Gallegos, M."
  - name: "Martín Pendás, Á."
  - name: "Rocha-Rinza, T." 
  paper:

    summary: "We studied aluminium-doped nanoclusters and their electronic and optic properties by means of density-functional theory and quantum chemical topology. With the increasing size of the molecular nano cluster, we explored the changes in adsorption energies with carbon dioxide.  We determined that Sc-doping the Al$_{13}$ cluster improves the CO$_2$ adsorption."
    url: https://doi.org/10.1039/D3CP01730C
  categories: ["qct", "clusters"]
  tags: ["QCT", "QTAIM", "IQA", "CO2 Adsorption", "Metallic Clusters"]


# ---------------  Molecular Qubits JACS Au
- title: Multiconfiguration Pair-Density Functional Theory for Chromium (IV) Moleclar Qubits 
  date: "September 2022"
  image: "images/sections/publications/toc6.png"
  publishedIn:
    name: "JACS Au, 2022, 2, 9, 2029-2037"
    #date: 
    url: https://doi.org/10.1021/jacsau.2c00306
  authors:
  - name: "Sauza-de la Vega, A."
    highlight: true
  - name: "Pandharkar, R."
  - name: "Stroscio, G. D."
  - name: "Sarkar, A."
  - name: "Truhlar, D. G."
  - name: "Gagliardi, L."
  paper:
    summary: "We developed a computational protocol based on hybrid MC-PDFT for the computation of triplet-singlet energy gaps and zero-field splitting parameters of molecular spin qubits. We assessed the influence of molecular geometries in the computation of the axial and rhombic parameters. To obtain semiqualitative description of axial parameter trends in the GHz regime, it is necessary to perform molecular optimizations. However, to address correctly the rhombic parameter, optimization of the molecular qubit candidates whithin a bulk is preferred. "
    url: https://doi.org/10.1021/jacsau.2c00306
  categories: ["qubits", "magnetism"]
  tags: ["Molecular Qubits", "Zero-Field Splitting", "Triplet-Singlet Gap", "Multireference Calculations"]


#------------Puto Aristi paper
- title: Computation of photovoltaic and stability properties of hybrid organic-inorganic perovskites via convolutional neural networks
  date: "March 2022"
  image: "images/sections/publications/toc5.png"
  publishedIn:
    name: "Theor. Chem. Acc., 2022, 141, 19 "
    #date: 
    url: https://link.springer.com/article/10.1007/s00214-022-02875-9
  authors:
  - name: "Aristizabal-Ferreira, V. A."
  - name: "Guevara-Vela, J. M."
  - name: "Sauza-de la Vega, A."
    highlight: true
  - name: "Martín Pendás, Á."
  - name: "Fuetes-Pineda, G."
  - name: "Rocha-Rinza, T."
  paper:
    summary: "Here, we used trained crystal graph neural networks with density functional theory calculations for the computation of band gaps, refractive indexes, atomization energies and unit cell volumes of hybrid organic-inorganic perovskites. Overall, our investigation shows how deep learning techniques can be exploited to achieve a rapid screening of potential photovoltaic materials in terms of their electronic properties and stability. "
    url: https://link.springer.com/article/10.1007/s00214-022-02875-9
  categories: ["machine-learning"]
  tags: ["Machine Learning", "Perovskites", "DFT", "Band Gap"]


#--------- Succinic Acid REG-IQA
- title: Towards and atomistic understanding of polymorphism in molecular solids.
  date: "April 2022"
  image: "images/sections/publications/toc4.png"
  publishedIn:
    name: "Phys. Chem. Chem. Phys., 2022, 24, 11278-11294"
    #date: 
    url: https://doi.org/10.1039/D2CP00457G
  authors:
  - name: "Sauza-de la Vega, A."
    highlight: true
  - name: "Duarte, L. J."
  - name: "Silva, A."
  - name: "Skelton, J."
  - name: "Rocha-Rinza, T."
  - name: "Popelier, P. L. A."
  paper:
    summary: "The rules that govern polymorphism in molecular solids are unknown. In this research, we explore the succinic acid polymorphs using the relative energy gradient approach to determine the energetic terms with largest influence for the transformation between the different polymorphs. Using the interacting quantum atoms energy approach we obtained energy terms that were tracked along reaction coordinates related to the transformation between the succinic acid polymorphs. We find that the  conformation is  mainly described by a combination of electrostatics and sterics."
    url: https://doi.org/10.1039/D2CP00457G
  categories: ["qct"]
  tags: ["QCT", "QTAIM", "Catalysis", "H-Bond"]


#-------- Water and epoxides
- title: Water clusters as bifunctional catalysts in organic chemistry. The hydrolysis of oxirane and its methyl derivatives.
  date: "July 2021"
  image: "images/sections/publications/toc3.png"
  publishedIn: 
    name: "Org. Biomol. Chem., 2021, 19, 6776-6780"
    #date: 
    url: https://doi.org/10.1039/D1OB01026C
  authors:
  - name: "Sauza-de la Vega, A."
    highlight: true
  - name: "Salazar-Lozas, H."
  - name: "Vallejo Narváez, W. E."
  - name: "Hernández-Rodríguez, M."
  - name: "Rocha-Rinza, T."
  paper:
    summary: "We explore the bifunctional catalyst role of water cluster for the hydrolysis reaction of various epoxides. With the addition of water molecules into the reactant cluster, the activation energy decreases, demonstrating the catalytic role of water clusters in organic reactions. We explore the kintetics and energetics of the explored reactions, and we studied the chemical-bonding scenario with the quantum theory of atoms in molecules."
    url: https://doi.org/10.1039/D1OB01026C
  categories: ["qct", "clusters"]
  tags: ["QCT", "QTAIM", "Catalysis", "H-Bond"]



